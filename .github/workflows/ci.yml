name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries iced needs to build on Linux — the exact list from
      # iced's own CI (not guessed). rfd uses its default xdg-portal backend, so
      # no GTK is strictly required to build, but libgtk-3-dev matches upstream
      # and is harmless. This is what lets the whole workspace (ferrus-gui
      # included) build/lint/test on the runner.
      - name: Install GUI system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libgtk-3-dev

      # rust-toolchain.toml pins Rust 1.94.1 with the clippy and rustfmt
      # components; rustup on the runner honors it (installs on first use).
      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Format (all crates)
        run: cargo fmt --all --check

      - name: Clippy (deny warnings, whole workspace)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (whole workspace)
        run: cargo test --workspace
